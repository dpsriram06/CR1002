name: CR1002 Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:

    strategy:
      matrix:
        os:
          - windows-latest
          

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CR1002/CR1002.csproj

      - name: Build
        run: dotnet build CR1002/CR1002.csproj --no-restore

      - name: Test
        run: dotnet test CR1002/TestProject1.csproj --no-build
